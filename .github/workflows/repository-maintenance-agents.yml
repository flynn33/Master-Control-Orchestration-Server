name: Repository Maintenance Agents

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-maintenance-main
  cancel-in-progress: false

jobs:
  maintain-repository:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate version, changelog, README, and wiki content
        id: prepare
        shell: bash
        run: |
          python scripts/github_agents/release_manager.py init
          python scripts/github_agents/release_manager.py bump --metadata-out .agent-release.json
          python scripts/github_agents/sync_docs.py
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          metadata = json.loads(Path(".agent-release.json").read_text(encoding="utf-8"))
          status = subprocess.run(
              ["git", "status", "--porcelain"],
              check=True,
              capture_output=True,
              text=True,
              encoding="utf-8",
          ).stdout.strip()

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"release_changed={'true' if metadata['changed'] else 'false'}\n")
              output.write(f"tag={metadata['tag']}\n")
              output.write(f"notes_path={metadata['notes_path']}\n")
              output.write(f"target_commit={metadata['target_commit']}\n")
              output.write(f"repo_changed={'true' if status else 'false'}\n")
          PY

      - name: Commit generated repository artifacts
        if: steps.prepare.outputs.repo_changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md VERSION.json README.md docs
          if [[ "${{ steps.prepare.outputs.release_changed }}" == "true" ]]; then
            git commit -m "chore(agents): sync release and docs for ${{ steps.prepare.outputs.tag }} [skip agents]"
          else
            git commit -m "chore(agents): sync repository docs [skip agents]"
          fi

      - name: Seal tracked release to generated commit
        if: steps.prepare.outputs.repo_changed == 'true' && steps.prepare.outputs.release_changed == 'true'
        shell: bash
        run: |
          python scripts/github_agents/release_manager.py seal --commit "$(git rev-parse HEAD)" --metadata-out .agent-release.json
          python scripts/github_agents/sync_docs.py
          git add CHANGELOG.md VERSION.json README.md docs
          git commit --amend --no-edit

      - name: Push generated repository artifacts
        if: steps.prepare.outputs.repo_changed == 'true'
        shell: bash
        run: git push

      - name: Publish GitHub release
        if: steps.prepare.outputs.release_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.prepare.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.prepare.outputs.tag }} already exists."
            exit 0
          fi

          TARGET_COMMIT="$(git rev-parse HEAD)"
          gh release create "${{ steps.prepare.outputs.tag }}" \
            --target "${TARGET_COMMIT}" \
            --title "${{ steps.prepare.outputs.tag }}" \
            --notes-file "${{ steps.prepare.outputs.notes_path }}"

      - name: Sync GitHub wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/github_agents/sync_docs.py --sync-wiki
