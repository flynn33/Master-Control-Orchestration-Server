name: Windows Build, Test, and Package

# PHASE-10 release-gate hard rule (ADR-002 §10):
# This workflow is the same-SHA product gate. It MUST stay triggered by
# `push` and `pull_request` only. DO NOT add `workflow_dispatch` here —
# manual dispatch would let an operator bypass a failing CI run by re-running
# from a clean state. The release workflow (.github/workflows/release.yml)
# explicitly verifies that this workflow succeeded on the same SHA before
# any artifact ships. FORBIDDEN-CONTRACT §6.2 greps for the bypass pattern.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel an older same-SHA run when a newer commit lands; prevents racing
# builds from publishing inconsistent artifacts under the same package name.
concurrency:
  group: windows-product-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-product-gate:
    # MasterControlShell.vcxproj is pinned to Platform Toolset v145 (Visual
    # Studio 18 / VS2026), which is not available on `windows-latest` (= VS2022
    # / v143). Per the GitHub runner-image roll-out for May 2026, the
    # `windows-2025` label redirects to `windows-2025-vs2026` and ships the
    # v145 toolset preinstalled. If that label is renamed in the future, also
    # update release.yml's runner.
    runs-on: windows-2025-vs2026
    env:
      PACKAGE_ROOT: dist/packages/release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PHASE-10 acceptance criterion: "Release version stamped before
      # configure/build/package." VERSION.json is the single source of truth
      # (`scripts/Sync-RepositoryVersionBadges.ps1`). This step reads it,
      # exposes the value as $env:MASTERCONTROL_VERSION for every later step,
      # and fails the gate if the file is malformed or absent. The badge
      # check below confirms README + vcpkg.json are in sync with this same
      # value before configure runs.
      - name: Stamp release version from VERSION.json
        shell: pwsh
        run: |
          $versionPath = Join-Path $env:GITHUB_WORKSPACE 'VERSION.json'
          if (-not (Test-Path $versionPath)) {
            Write-Error "VERSION.json not found at $versionPath"
            exit 1
          }
          $version = Get-Content -Path $versionPath -Raw | ConvertFrom-Json
          if (-not $version.current_version) {
            Write-Error "VERSION.json missing current_version"
            exit 1
          }
          Write-Host "Release version: $($version.current_version) ($($version.released_at))"
          "MASTERCONTROL_VERSION=$($version.current_version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MASTERCONTROL_RELEASED_AT=$($version.released_at)"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Discover and document toolchain
        shell: pwsh
        run: |
          $vsInstall = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          Write-Host "Visual Studio install: $vsInstall"
          $vsVersion = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -property installationVersion
          Write-Host "Visual Studio version: $vsVersion"
          # PHASE-10: ADR-002 §10 forbids hardcoded VS Enterprise paths
          # in workflow steps and resolver scripts. vswhere is the only
          # supported discovery path.
          if ($vsInstall -match 'Enterprise') {
            Write-Warning "vswhere resolved to a VS Enterprise install. The toolchain works on Enterprise too, but workflow steps must never hardcode the Enterprise edition path."
          }
          cmake --version
          Write-Host "vcpkg: $(vcpkg version 2>&1 | Select-Object -First 1)"

      - name: Bootstrap vcpkg and install dependencies
        shell: pwsh
        run: |
          # vcpkg.json at the repo root puts vcpkg in manifest mode, where
          # `vcpkg install <port>` is rejected with "In manifest mode, vcpkg
          # install does not support individual package arguments." The
          # manifest already lists nlohmann-json (and is the source of truth
          # for any future deps), so the manifest-mode form is the right
          # invocation here. The CMake preset's vcpkg toolchain file would
          # also auto-install at configure time; running it explicitly first
          # keeps the early-fail-loudly property when vcpkg.json is malformed.
          vcpkg install --triplet x64-windows

      - name: Check repository version metadata
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Sync-RepositoryVersionBadges.ps1 -CheckOnly

      - name: Propagate VCPKG_ROOT for the CMake preset
        shell: pwsh
        run: |
          # CMakeLists.txt:14-20 throws "VCPKG_ROOT is not set in the current
          # environment" because CMakePresets.json references
          # $env{VCPKG_ROOT}. github-hosted windows runners pre-install
          # vcpkg at $env:VCPKG_INSTALLATION_ROOT (documented at
          # https://github.com/actions/runner-images); copy it into
          # VCPKG_ROOT for every subsequent step in this job.
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            Write-Error "VCPKG_INSTALLATION_ROOT is not set on this runner; cannot derive VCPKG_ROOT."
            exit 1
          }
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "VCPKG_ROOT will be: $env:VCPKG_INSTALLATION_ROOT"

      - name: Configure (Release)
        shell: pwsh
        run: |
          cmake --preset release

      - name: Build (Release)
        shell: pwsh
        run: |
          cmake --build build/release --config Release

      - name: Test (CTest)
        shell: pwsh
        run: |
          ctest --test-dir build/release -C Release --output-on-failure --timeout 300

      - name: Package
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Package-MasterControlOrchestrationServer.ps1 -Preset release -SkipBuild

      - name: Smoke validation - verify package contents
        shell: pwsh
        run: |
          $packageDir = Get-ChildItem -Path $env:PACKAGE_ROOT -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $packageDir) {
            Write-Error "No package output found in $env:PACKAGE_ROOT"
            exit 1
          }
          $requiredFiles = @(
            "MasterControlServiceHost.exe",
            "MasterControlShell.exe",
            "MasterControlBootstrapper.exe"
          )
          foreach ($file in $requiredFiles) {
            $found = Get-ChildItem -Path $packageDir.FullName -Recurse -Filter $file
            if (-not $found) {
              Write-Error "Missing required binary: $file"
              exit 1
            }
            Write-Host "Found: $($found.FullName)"
          }
          $versionJson = Get-Content -Path VERSION.json -Raw | ConvertFrom-Json
          Write-Host "Package version: $($versionJson.current_version)"

      - name: Bootstrapper preflight validation
        shell: pwsh
        run: |
          $bootstrapper = Get-ChildItem -Path $env:PACKAGE_ROOT -Recurse -Filter "MasterControlBootstrapper.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($bootstrapper) {
            & $bootstrapper.FullName preflight --json-output 2>&1 | Out-Host
            Write-Host "Bootstrapper preflight completed (exit: $LASTEXITCODE)"
          } else {
            Write-Warning "Bootstrapper binary not found in package output - skipping preflight"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastercontrol-release-package
          path: ${{ env.PACKAGE_ROOT }}
          retention-days: 14
