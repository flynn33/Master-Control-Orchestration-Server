# Forsetti Framework — CI Build & Test
# Builds the project and runs tests on every PR and push to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    strategy:
      matrix:
        preset: [debug]

    env:
      VCPKG_ROOT: C:/vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        run: |
          cd $env:VCPKG_ROOT
          git pull
          .\bootstrap-vcpkg.bat

      - name: Restore vcpkg packages
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows
        working-directory: ${{ github.workspace }}

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --no-tests=error
