# Forsetti Framework — Conventional Commit Lint
# Ensures PR titles follow Conventional Commits format.
# This is critical because the version-bump and changelog workflows rely on these prefixes.

name: Commit Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Conventional Commits pattern:
            // type(optional-scope): description
            // type!: description (breaking change)
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?\s*:\s*.+/i;

            if (!pattern.test(title)) {
              const body = [
                '## PR Title Does Not Follow Conventional Commits',
                '',
                `**Current title:** \`${title}\``,
                '',
                'PR titles must follow [Conventional Commits](https://www.conventionalcommits.org/) format:',
                '',
                '```',
                'type(optional-scope): description',
                '```',
                '',
                '**Allowed types:** `feat`, `fix`, `docs`, `style`, `refactor`, `perf`, `test`, `build`, `ci`, `chore`, `revert`',
                '',
                '**Examples:**',
                '- `feat: add module hot-reload support`',
                '- `fix(core): resolve race condition in bootstrap`',
                '- `feat!: redesign entitlement API` (breaking change)',
                '- `docs: update README with build instructions`',
                '',
                'This format is required for automated version bumping and changelog generation.',
              ].join('\n');

              core.setFailed(body);
            } else {
              console.log(`PR title "${title}" follows Conventional Commits format.`);
            }
