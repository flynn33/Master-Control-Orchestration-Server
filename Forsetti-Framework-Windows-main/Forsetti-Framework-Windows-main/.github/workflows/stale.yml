# Forsetti Framework — Stale Issue & PR Cleanup
# Marks inactive issues/PRs as stale after 60 days, closes after 90.

name: Stale

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 30
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 30 days if no further activity occurs.
            If this issue is still relevant, please comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 30 days if no further activity occurs.
            If this PR is still relevant, please comment, push changes, or remove the stale label.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          exempt-issue-labels: 'pinned,security,version:major'
          exempt-pr-labels: 'pinned,security,version:major'
