# Forsetti Framework — PR Size Labeler
# Automatically labels PRs by diff size to help reviewers prioritize.

name: PR Size

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  label-size:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            // Sum additions + deletions across all files
            const totalChanges = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            // Determine size label
            let size;
            if (totalChanges <= 10) {
              size = 'size/XS';
            } else if (totalChanges <= 50) {
              size = 'size/S';
            } else if (totalChanges <= 200) {
              size = 'size/M';
            } else if (totalChanges <= 500) {
              size = 'size/L';
            } else {
              size = 'size/XL';
            }

            // Remove any existing size labels
            const sizeLabels = ['size/XS', 'size/S', 'size/M', 'size/L', 'size/XL'];
            const currentLabels = context.payload.pull_request.labels.map(l => l.name);
            for (const label of currentLabels) {
              if (sizeLabels.includes(label) && label !== size) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label,
                });
              }
            }

            // Apply the correct size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [size],
            });

            console.log(`PR has ${totalChanges} changed lines → labeled ${size}`);
